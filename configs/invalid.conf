# test du parser uniquement

server {
    listen 127.0.0.1:8002;
	server_name localhost memeplusieurs holla;

    root docs/fusion_web/;
    # client_max_body_size 3000000;
	index index.html;
    error_page 404 error_pages/404.html;

    location / {
        methods  DELETE POST GET;
        autoindex off;
    }
    
    location /tours {
        autoindex on;
        index tours1.html;
        methods GET POST;  #PUT HEAD
    }

	location /red {
		return 333 /tours;
	}

    location /cgi-bin {
        root ./;
        methods GET POST DELETE;
        index time.py;
        cgi .py /usr/bin/python3 ;
        cgi .sh  /bin/bash;
    }
}